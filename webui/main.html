<html>

<head>
    <title>Whiteboard Panel</title>
    <script type="module">
        import { store } from "/plugins/a0_whiteboard/webui/whiteboard-store.js";
    </script>
</head>

<body>
    <div x-data x-init="$store.whiteboard && $store.whiteboard.open()">
        <button class="whiteboard-floating-launcher"
            x-show="$store.whiteboard && !$store.whiteboard.isOpen"
            @click="$store.whiteboard.open()"
            title="Open Whiteboard">
            <span class="material-symbols-outlined">draw</span>
            <span>Whiteboard</span>
        </button>

        <template x-if="$store.whiteboard && $store.whiteboard.isOpen">
            <div id="whiteboard-panel" class="whiteboard-floating-panel"
                :class="{ 'minimized': $store.whiteboard.isMinimized }"
                :style="$store.whiteboard.getPanelStyle()">

                <!-- Header with drag handle -->
                <div class="whiteboard-header" @mousedown="$store.whiteboard.startDrag($event)">
                    <div class="header-left">
                        <span class="material-symbols-outlined">draw</span>
                        <span class="header-title">Whiteboard</span>
                        <span class="connection-status" :class="$store.whiteboard.connectionStatus"
                            x-text="$store.whiteboard.connectionStatus === 'connected' ? '● Connected' : '○ Disconnected'">
                        </span>
                    </div>
                    <div class="header-controls">
                        <div class="board-controls">
                            <button @click="$store.whiteboard.saveBoard()" class="control-btn" title="Save Board">
                                <span class="material-symbols-outlined">save</span>
                            </button>
                            <button @click="$store.whiteboard.showLoadDialog()" class="control-btn" title="Load Board">
                                <span class="material-symbols-outlined">folder_open</span>
                            </button>
                            <button @click="$store.whiteboard.clearBoard()" class="control-btn" title="Clear Board">
                                <span class="material-symbols-outlined">delete_sweep</span>
                            </button>
                        </div>
                        <div class="divider"></div>
                        <button @click="$store.whiteboard.togglePrivacyMode()" class="control-btn"
                            :class="{ 'privacy-active': $store.whiteboard.privacyMode }"
                            :title="$store.whiteboard.privacyMode ? 'Privacy ON (Agent cannot see changes)' : 'Privacy OFF (Agent sees changes)'">
                            <span class="material-symbols-outlined"
                                x-text="$store.whiteboard.privacyMode ? 'visibility_off' : 'visibility'">
                            </span>
                        </button>
                        <button @click="$store.whiteboard.toggleMinimize()" class="control-btn"
                            :title="$store.whiteboard.isMinimized ? 'Expand' : 'Minimize'">
                            <span class="material-symbols-outlined"
                                x-text="$store.whiteboard.isMinimized ? 'expand_less' : 'expand_more'">
                            </span>
                        </button>
                        <button @click="$store.whiteboard.toggleFullscreen()" class="control-btn" title="Fullscreen">
                            <span class="material-symbols-outlined">fullscreen</span>
                        </button>
                        <button @click="$store.whiteboard.close()" class="control-btn close-btn" title="Close">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>
                </div>

                <!-- Canvas iframe -->
                <div class="whiteboard-content" x-show="!$store.whiteboard.isMinimized">
                    <iframe src="/plugins/a0_whiteboard/webui/canvas.html"
                        frameborder="0"
                        allow="clipboard-read; clipboard-write"
                        class="whiteboard-iframe"
                        @load="console.log('[Whiteboard] canvas loaded')"
                        @error="console.error('[Whiteboard] canvas error')">
                    </iframe>
                </div>

                <!-- Resize handle -->
                <div class="resize-handle" x-show="!$store.whiteboard.isMinimized"
                    @mousedown="$store.whiteboard.startResize($event)">
                </div>
            </div>
        </template>
    </div>

    <style>
        .whiteboard-floating-panel {
            position: fixed; z-index: 9999;
            background: #0d0d0d;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 20px 50px rgba(0,0,0,0.5), 0 0 100px rgba(99,102,241,0.1);
            display: flex; flex-direction: column; overflow: hidden;
            backdrop-filter: blur(20px);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .whiteboard-floating-launcher {
            position: fixed;
            right: 24px;
            bottom: 96px;
            z-index: 9998;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border: 1px solid rgba(129, 140, 248, 0.45);
            border-radius: 999px;
            background: rgba(13, 13, 13, 0.92);
            color: rgba(255, 255, 255, 0.92);
            cursor: pointer;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.45), 0 0 28px rgba(129, 140, 248, 0.18);
            backdrop-filter: blur(18px);
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }
        .whiteboard-floating-launcher:hover {
            transform: translateY(-2px);
            border-color: rgba(129, 140, 248, 0.85);
            box-shadow: 0 16px 42px rgba(0, 0, 0, 0.55), 0 0 34px rgba(129, 140, 248, 0.32);
        }
        .whiteboard-floating-launcher .material-symbols-outlined {
            color: #818cf8;
            font-size: 20px;
        }
        .whiteboard-floating-launcher span:last-child {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }
        .whiteboard-floating-panel:hover {
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 25px 60px rgba(0,0,0,0.6), 0 0 120px rgba(99,102,241,0.15);
        }
        .whiteboard-floating-panel.minimized { height: auto !important; }

        .whiteboard-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            cursor: move; user-select: none;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .header-left { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.9); }
        .header-left .material-symbols-outlined { font-size: 20px; color: #818cf8; }
        .header-title { font-weight: 600; font-size: 13px; letter-spacing: 0.3px; text-transform: uppercase; }
        .connection-status { font-size: 8px; margin-left: 6px; padding: 3px 8px; border-radius: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .connection-status.connected { color: #22c55e; background: rgba(34,197,94,0.15); }
        .connection-status.disconnected { color: #ef4444; background: rgba(239,68,68,0.15); }
        .connection-status.connecting { color: #f59e0b; background: rgba(245,158,11,0.15); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        .header-controls { display: flex; gap: 2px; align-items: center; }
        .board-controls { display: flex; gap: 2px; }
        .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 4px; }
        .control-btn { background: transparent; border: none; color: rgba(255,255,255,0.4); cursor: pointer; padding: 6px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .control-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
        .control-btn .material-symbols-outlined { font-size: 18px; }
        .close-btn:hover { background: rgba(239,68,68,0.15); color: #ef4444; }
        .control-btn.privacy-active { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .control-btn.privacy-active:hover { background: rgba(245,158,11,0.3); }

        .whiteboard-content { flex: 1; overflow: hidden; min-height: 300px; height: calc(100% - 52px); background: #1a1a1a; border-radius: 0 0 16px 16px; }
        .whiteboard-iframe { width: 100%; height: 100%; min-height: 300px; border: none; background: #1a1a1a; display: block; border-radius: 0 0 15px 15px; }

        .resize-handle { position: absolute; bottom: 4px; right: 4px; width: 20px; height: 20px; cursor: se-resize; opacity: 0.3; transition: opacity 0.2s ease; }
        .resize-handle::before { content: ''; position: absolute; bottom: 4px; right: 4px; width: 8px; height: 8px; border-right: 2px solid rgba(255,255,255,0.4); border-bottom: 2px solid rgba(255,255,255,0.4); border-radius: 0 0 3px 0; }
        .resize-handle:hover { opacity: 1; }
        .resize-handle:hover::before { border-color: #818cf8; }
    </style>
</body>

</html>
