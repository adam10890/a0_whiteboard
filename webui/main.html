<!--
  a0_whiteboard - Surface entry HTML loaded by the Right Canvas system.

  Matches the contract used by the built-in _browser / _desktop surfaces:
  the surface chrome reads the data-* attributes here to know how to dock
  the surface, its title, and its icon. The body delegates to the actual
  panel component (whiteboard-panel.html) via <x-component>.

  Both `data-surface-*` and `data-canvas-*` are set because A0 versions
  between v1.15 and v1.17 sniff one or the other depending on whether
  the surface is in modal or docked mode.
-->
<html
  class="whiteboard-modal"
  data-surface-id="whiteboard"
  data-surface-modal-path="/plugins/a0_whiteboard/webui/main.html"
  data-surface-dock-title="Open Whiteboard in canvas"
  data-surface-dock-icon="dock_to_right"
  data-canvas-surface="whiteboard"
  data-canvas-modal-path="/plugins/a0_whiteboard/webui/main.html"
  data-canvas-dock-title="Open Whiteboard in canvas"
  data-canvas-dock-icon="dock_to_right"
>
<head>
  <title>Whiteboard</title>
  <script type="module">
    import { store } from "/plugins/a0_whiteboard/webui/whiteboard-store.js";
  </script>
</head>
<body class="whiteboard-modal-body">
  <x-component path="/plugins/a0_whiteboard/webui/whiteboard-panel.html"></x-component>
</body>
</html>
