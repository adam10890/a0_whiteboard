<!--
  a0_whiteboard — Right Canvas surface panel (A0 v1.15)
  Loaded by the canvas system; replaces the legacy floating panel.html.
  No drag/resize/minimize/fullscreen — the canvas chrome owns those.
-->
<div x-data x-init="$store.whiteboard && $store.whiteboard.onPanelMount($el)" class="wb-surface-root">
  <div class="wb-panel" :data-mode="$store.whiteboard.surfaceMode" :data-attention="$store.whiteboard.pendingAttention">
    <header class="wb-toolbar">
      <span class="wb-title">
        <span class="material-symbols-outlined">draw</span>
        <span>Whiteboard</span>
        <span class="wb-status"
              :class="$store.whiteboard.connectionStatus"
              :title="'WebSocket: ' + $store.whiteboard.connectionStatus"
              x-text="$store.whiteboard.connectionStatus === 'connected' ? '●' : '○'"></span>
      </span>
      <div class="wb-actions">
        <button class="wb-btn" @click="$store.whiteboard.saveBoard()" title="Save board">
          <span class="material-symbols-outlined">save</span>
        </button>
        <button class="wb-btn" @click="$store.whiteboard.showLoadDialog()" title="Load board">
          <span class="material-symbols-outlined">folder_open</span>
        </button>
        <button class="wb-btn" @click="$store.whiteboard.clearBoard()" title="Clear board">
          <span class="material-symbols-outlined">delete_sweep</span>
        </button>
        <span class="wb-divider"></span>
        <button class="wb-btn"
                :class="{ active: $store.whiteboard.privacyMode }"
                @click="$store.whiteboard.togglePrivacyMode()"
                :title="$store.whiteboard.privacyMode ? 'Privacy: ON (changes stay local)' : 'Privacy: OFF (changes sync)'">
          <span class="material-symbols-outlined" x-text="$store.whiteboard.privacyMode ? 'visibility_off' : 'visibility'"></span>
        </button>
        <span class="wb-divider"></span>
        <select class="wb-engine"
                x-model="$store.whiteboard.currentEngine"
                @change="$store.whiteboard.switchEngine($event.target.value)"
                title="Drawing engine">
          <option value="tldraw">tldraw</option>
          <option value="html5">HTML5</option>
        </select>
        <button class="wb-btn"
                @click="$store.whiteboard.toggleMode()"
                :title="$store.whiteboard.surfaceMode === 'modal' ? 'Dock into canvas' : 'Pop out as modal'">
          <span class="material-symbols-outlined"
                x-text="$store.whiteboard.surfaceMode === 'modal' ? 'dock_to_right' : 'open_in_new'"></span>
        </button>
      </div>
    </header>
    <div class="wb-body">
      <iframe class="whiteboard-iframe"
              :src="$store.whiteboard.engineUrl"
              frameborder="0"
              allow="clipboard-read; clipboard-write"
              referrerpolicy="no-referrer"></iframe>
    </div>
  </div>
</div>

<style>
  .wb-surface-root {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .wb-panel {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #0d0d0d;
    color: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wb-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 10px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    min-height: 44px;
    box-sizing: border-box;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  /* A0 v1.17 removed the right-canvas width cap, so we must survive
     very narrow widths. Hide the title text below ~360px; let actions
     wrap below the title. */
  @container (max-width: 360px) {
    .wb-title > span:nth-child(2) { display: none; }
  }
  .wb-surface-root { container-type: inline-size; }
  .wb-title {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: #c7d2fe;
  }
  .wb-title .material-symbols-outlined { font-size: 18px; color: #818cf8; }
  .wb-status {
    font-size: 16px;
    line-height: 1;
    margin-left: 4px;
    color: #6b7280;
  }
  .wb-status.connected { color: #4ade80; }
  .wb-status.connecting { color: #fbbf24; }
  .wb-actions {
    display: inline-flex;
    align-items: center;
    gap: 2px;
  }
  .wb-btn {
    background: transparent;
    border: 1px solid transparent;
    color: #e5e7eb;
    border-radius: 6px;
    width: 30px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .wb-btn:hover { background: rgba(129,140,248,0.12); border-color: rgba(129,140,248,0.3); }
  .wb-btn.active { background: rgba(129,140,248,0.2); border-color: rgba(129,140,248,0.5); }
  .wb-btn .material-symbols-outlined { font-size: 18px; }
  .wb-divider {
    width: 1px;
    height: 18px;
    background: rgba(255,255,255,0.12);
    margin: 0 4px;
  }
  .wb-engine {
    background: rgba(255,255,255,0.06);
    color: #e5e7eb;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 3px 6px;
    font-size: 12px;
    cursor: pointer;
    max-width: 90px;
  }
  .wb-actions { flex-wrap: wrap; row-gap: 4px; justify-content: flex-end; }
  .wb-body {
    flex: 1 1 auto;
    min-height: 0;
    position: relative;
    background: #1a1a1a;
  }
  .whiteboard-iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .wb-panel[data-attention="true"] .wb-title { animation: wb-pulse 1.4s ease-in-out 2; }
  @keyframes wb-pulse {
    0%, 100% { color: #c7d2fe; }
    50%      { color: #fde68a; }
  }
</style>
