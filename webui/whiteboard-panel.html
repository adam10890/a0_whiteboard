<!--
  a0_whiteboard — Right Canvas surface panel (A0 v1.15)
  Loaded by the canvas system; replaces the legacy floating panel.html.
  No drag/resize/minimize/fullscreen — the canvas chrome owns those.
-->
<script type="module" src="/plugins/a0_whiteboard/webui/whiteboard-store.js"></script>
<div x-data class="wb-surface-root" data-surface-id="whiteboard">
  <div class="wb-panel"
       x-create="$store.whiteboard && $store.whiteboard.onOpen($el)"
       x-destroy="$store.whiteboard && $store.whiteboard.cleanup($el)"
       :data-mode="$store.whiteboard?.surfaceMode" :data-attention="$store.whiteboard?.pendingAttention">
    <header class="wb-toolbar">
      <span class="wb-title">
        <span class="material-symbols-outlined">draw</span>
        <span>Whiteboard</span>
        <span class="wb-status"
              :class="$store.whiteboard?.connectionStatus"
              :title="'WebSocket: ' + ($store.whiteboard?.connectionStatus || 'disconnected')"
              x-text="$store.whiteboard?.connectionStatus === 'connected' ? '●' : '○'"></span>
      </span>
      <div class="wb-actions">
        <button class="wb-btn" @click="$store.whiteboard?.saveBoard()" title="Save board">
          <span class="material-symbols-outlined">save</span>
        </button>
        <button class="wb-btn" @click="$store.whiteboard?.showLoadDialog()" title="Load board">
          <span class="material-symbols-outlined">folder_open</span>
        </button>
        <button class="wb-btn" @click="$store.whiteboard?.clearBoard()" title="Clear board">
          <span class="material-symbols-outlined">delete_sweep</span>
        </button>
        <span class="wb-divider"></span>
        <button class="wb-btn"
                :class="{ active: $store.whiteboard?.privacyMode }"
                @click="$store.whiteboard?.togglePrivacyMode()"
                :title="$store.whiteboard?.privacyMode ? 'Privacy: ON (changes stay local)' : 'Privacy: OFF (changes sync)'">
          <span class="material-symbols-outlined" x-text="$store.whiteboard?.privacyMode ? 'visibility_off' : 'visibility'"></span>
        </button>
        <span class="wb-divider"></span>
        <select class="wb-engine"
                x-model="$store.whiteboard.currentEngine"
                @change="$store.whiteboard.switchEngine($event.target.value)"
                title="Drawing engine">
          <option value="tldraw">tldraw</option>
          <option value="html5">HTML5</option>
        </select>
        <button class="wb-btn"
                @click="$store.whiteboard?.toggleMode()"
                :title="$store.whiteboard?.surfaceMode === 'modal' ? 'Dock into canvas' : 'Pop out as modal'">
          <span class="material-symbols-outlined"
                x-text="$store.whiteboard?.surfaceMode === 'modal' ? 'dock_to_right' : 'open_in_new'"></span>
        </button>
      </div>
    </header>
    <div class="wb-body">
      <iframe class="whiteboard-iframe"
              :src="$store.whiteboard?.engineUrl"
              frameborder="0"
              allow="clipboard-read; clipboard-write"
              referrerpolicy="no-referrer"></iframe>
    </div>
  </div>
</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap');

  .wb-surface-root {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    container-type: inline-size;
  }
  .wb-panel {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #09090b;
    color: #f4f4f5;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wb-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(15, 15, 20, 0.7);
    backdrop-filter: blur(12px) saturate(180%);
    -webkit-backdrop-filter: blur(12px) saturate(180%);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    min-height: 48px;
    box-sizing: border-box;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  /* A0 v1.17 removed the right-canvas width cap, so we must survive
     very narrow widths. Hide the title text below ~360px; let actions
     wrap below the title. */
  @container (max-width: 360px) {
    .wb-title > span:nth-child(2) { display: none; }
  }
  .wb-title {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #c7d2fe;
  }
  .wb-title .material-symbols-outlined {
    font-size: 20px;
    color: #818cf8;
    filter: drop-shadow(0 0 8px rgba(129, 140, 248, 0.4));
  }
  .wb-status {
    font-size: 16px;
    line-height: 1;
    margin-left: 4px;
    color: #71717a;
    text-shadow: 0 0 4px rgba(0,0,0,0.5);
  }
  .wb-status.connected {
    color: #10b981;
    text-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
  }
  .wb-status.connecting {
    color: #f59e0b;
    text-shadow: 0 0 8px rgba(245, 158, 11, 0.6);
  }
  .wb-actions {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    row-gap: 4px;
    justify-content: flex-end;
  }
  .wb-btn {
    background: transparent;
    border: 1px solid transparent;
    color: #a1a1aa;
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .wb-btn:hover {
    background: rgba(129, 140, 248, 0.12);
    color: #f4f4f5;
    border-color: rgba(129, 140, 248, 0.3);
    transform: translateY(-1px);
  }
  .wb-btn:active {
    transform: translateY(1px);
  }
  .wb-btn.active {
    background: rgba(129, 140, 248, 0.18);
    color: #818cf8;
    border-color: rgba(129, 140, 248, 0.4);
  }
  .wb-btn .material-symbols-outlined { font-size: 18px; }
  .wb-divider {
    width: 1px;
    height: 18px;
    background: rgba(255, 255, 255, 0.12);
    margin: 0 6px;
  }
  .wb-engine {
    background: rgba(255, 255, 255, 0.05);
    color: #e4e4e7;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
    max-width: 90px;
    font-family: inherit;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    outline: none;
  }
  .wb-engine:hover, .wb-engine:focus {
    border-color: rgba(129, 140, 248, 0.4);
    background: rgba(255, 255, 255, 0.08);
  }
  .wb-body {
    flex: 1 1 auto;
    min-height: 0;
    position: relative;
    background: #121214;
  }
  .whiteboard-iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .wb-panel[data-attention="true"] .wb-title { animation: wb-pulse 1.4s ease-in-out infinite; }
  @keyframes wb-pulse {
    0%, 100% { color: #c7d2fe; filter: drop-shadow(0 0 0px rgba(129,140,248,0)); }
    50%      { color: #fde68a; filter: drop-shadow(0 0 8px rgba(253,230,138,0.5)); }
  }

  /* Custom Premium Dark Scrollbars */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.1);
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.3);
  }
</style>
