<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whiteboard Canvas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }

  #canvas-wrap { position: relative; width: 100%; height: 100%; }
  #wb-canvas { display: block; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }

  #toolbar {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; align-items: center;
    background: rgba(13,13,13,0.92); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 6px 10px;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .tool-btn {
    width: 34px; height: 34px; border-radius: 8px; border: none;
    background: transparent; color: rgba(255,255,255,0.5);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.15s ease;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
  .tool-btn.active { background: rgba(99,102,241,0.25); color: #818cf8; }
  .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 2px; }

  .color-dot {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; transition: all 0.15s;
  }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.active { border-color: rgba(255,255,255,0.7); }

  #size-slider {
    -webkit-appearance: none; width: 60px; height: 4px;
    background: rgba(255,255,255,0.15); border-radius: 2px; outline: none; cursor: pointer;
  }
  #size-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: #818cf8; border-radius: 50%;
  }

  #agent-overlay {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.4);
    color: #c7d2fe; font-size: 11px; padding: 4px 12px; border-radius: 20px;
    pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
    font-family: sans-serif;
  }
  #agent-overlay.visible { opacity: 1; }
</style>
</head>
<body>
<div id="canvas-wrap">
  <canvas id="wb-canvas"></canvas>

  <div id="toolbar">
    <!-- Tools -->
    <button class="tool-btn active" id="btn-pen" title="Pen" data-tool="pen">✏️</button>
    <button class="tool-btn" id="btn-line" title="Line" data-tool="line">╱</button>
    <button class="tool-btn" id="btn-rect" title="Rectangle" data-tool="rect">▭</button>
    <button class="tool-btn" id="btn-ellipse" title="Ellipse" data-tool="ellipse">○</button>
    <button class="tool-btn" id="btn-text" title="Text" data-tool="text">T</button>
    <button class="tool-btn" id="btn-eraser" title="Eraser" data-tool="eraser">⌫</button>
    <div class="sep"></div>
    <!-- Colors -->
    <div class="color-dot active" data-color="#ffffff" style="background:#ffffff" title="White"></div>
    <div class="color-dot" data-color="#818cf8" style="background:#818cf8" title="Indigo"></div>
    <div class="color-dot" data-color="#34d399" style="background:#34d399" title="Green"></div>
    <div class="color-dot" data-color="#f87171" style="background:#f87171" title="Red"></div>
    <div class="color-dot" data-color="#fbbf24" style="background:#fbbf24" title="Yellow"></div>
    <div class="color-dot" data-color="#60a5fa" style="background:#60a5fa" title="Blue"></div>
    <div class="sep"></div>
    <!-- Size -->
    <input id="size-slider" type="range" min="1" max="24" value="3" title="Stroke size">
    <div class="sep"></div>
    <!-- Actions -->
    <button class="tool-btn" id="btn-undo" title="Undo">↩</button>
    <button class="tool-btn" id="btn-clear" title="Clear all">🗑</button>
  </div>

  <div id="agent-overlay">Agent is drawing…</div>
</div>

<script>
const canvas = document.getElementById('wb-canvas');
const ctx = canvas.getContext('2d');
let tool = 'pen', color = '#ffffff', size = 3;
let drawing = false, startX = 0, startY = 0;
let snapshot = null;
const history = [];

// ── Resize ──────────────────────────────────────────────────────────────────
function resize() {
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  ctx.putImageData(img, 0, 0);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}
new ResizeObserver(resize).observe(canvas);
resize();

// ── Toolbar ──────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tool = btn.dataset.tool;
    canvas.style.cursor = tool === 'eraser' ? 'cell' : (tool === 'text' ? 'text' : 'crosshair');
  });
});

document.querySelectorAll('[data-color]').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('[data-color]').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    color = dot.dataset.color;
  });
});

document.getElementById('size-slider').addEventListener('input', e => { size = +e.target.value; });
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-clear').addEventListener('click', clearAll);

// ── Drawing ──────────────────────────────────────────────────────────────────
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

canvas.addEventListener('pointerdown', e => {
  if (e.button !== undefined && e.button !== 0) return;
  const { x, y } = getPos(e);
  drawing = true; startX = x; startY = y;

  if (tool === 'text') {
    drawing = false;
    const txt = prompt('Enter text:');
    if (txt) {
      saveHistory();
      ctx.font = `${Math.max(14, size * 4)}px sans-serif`;
      ctx.fillStyle = color;
      ctx.fillText(txt, x, y);
      broadcastState();
    }
    return;
  }

  saveHistory();
  snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
  ctx.moveTo(x, y);
});

canvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  const { x, y } = getPos(e);

  if (tool === 'pen') {
    ctx.strokeStyle = color; ctx.lineWidth = size;
    ctx.lineTo(x, y); ctx.stroke();
  } else if (tool === 'eraser') {
    ctx.clearRect(x - size * 4, y - size * 4, size * 8, size * 8);
  } else {
    ctx.putImageData(snapshot, 0, 0);
    ctx.strokeStyle = color; ctx.lineWidth = size;
    ctx.beginPath();
    if (tool === 'line') {
      ctx.moveTo(startX, startY); ctx.lineTo(x, y);
    } else if (tool === 'rect') {
      ctx.rect(startX, startY, x - startX, y - startY);
    } else if (tool === 'ellipse') {
      const rx = Math.abs(x - startX) / 2, ry = Math.abs(y - startY) / 2;
      ctx.ellipse(startX + (x - startX) / 2, startY + (y - startY) / 2, rx, ry, 0, 0, Math.PI * 2);
    }
    ctx.stroke();
  }
});

canvas.addEventListener('pointerup', () => {
  if (!drawing) return;
  drawing = false;
  broadcastState();
});

canvas.addEventListener('pointerleave', () => { if (drawing) { drawing = false; broadcastState(); } });

// ── History ──────────────────────────────────────────────────────────────────
function saveHistory() {
  if (history.length > 50) history.shift();
  history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
}

function undo() {
  if (history.length === 0) return;
  ctx.putImageData(history.pop(), 0, 0);
  broadcastState();
}

function clearAll() {
  saveHistory();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  broadcastState();
}

// ── State sync via postMessage ────────────────────────────────────────────────
function broadcastState() {
  const dataUrl = canvas.toDataURL('image/png');
  window.parent.postMessage({
    type: 'whiteboard:full_state',
    dataUrl,
  }, '*');
}

window.addEventListener('message', event => {
  const msg = event.data;
  if (!msg?.type) return;

  if (msg.type === 'whiteboard:initial_state' || msg.type === 'whiteboard:state_change') {
    renderState(msg.state || msg);
  }

  if (msg.type === 'whiteboard:intent') {
    handleAgentIntent(msg.action, msg.data);
  }

  if (msg.type === 'whiteboard:connection_status') {
    // ready — request initial state
    window.parent.postMessage({ type: 'whiteboard:iframe_ready' }, '*');
  }
});

function renderState(state) {
  const shapes = Array.isArray(state?.shapes) ? state.shapes : [];
  if (state?.dataUrl) {
    applyDataUrl(state.dataUrl, () => drawShapes(shapes));
    return;
  }
  saveHistory();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawShapes(shapes);
}

function applyDataUrl(dataUrl, afterLoad) {
  const img = new Image();
  img.onload = () => {
    saveHistory();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    if (afterLoad) afterLoad();
  };
  img.src = dataUrl;
}

// ── Agent intent handling ─────────────────────────────────────────────────────
function handleAgentIntent(action, data) {
  showAgentOverlay();
  saveHistory();

  if (action === 'clear_canvas') {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    return;
  }

  const shapes = data?.shapes || (data ? [data] : []);
  drawShapes(shapes);
  broadcastState();
}

function drawShapes(shapes) {
  shapes.forEach(shape => drawShape(shape));
}

function drawShape(shape) {
  const props = shape.props || {};
  const c = props.color || shape.color || '#818cf8';
  const lw = props.strokeWidth || shape.strokeWidth || 2;
  const fill = props.fill || shape.fill || 'transparent';
  const text = props.text || shape.text || '';
  const fontSize = props.fontSize || shape.fontSize || 16;
  ctx.strokeStyle = c; ctx.lineWidth = lw;
  ctx.fillStyle = fill;

  if (shape.type === 'text' && text) {
    ctx.font = `${fontSize}px sans-serif`;
    ctx.fillStyle = c;
    ctx.fillText(text, shape.x || 50, shape.y || 50);
    return;
  }

  ctx.beginPath();
  if (shape.type === 'line' && shape.points?.length >= 2) {
    const pts = shape.points;
    ctx.moveTo(pts[0], pts[1]);
    for (let i = 2; i < pts.length; i += 2) ctx.lineTo(pts[i], pts[i + 1]);
    ctx.stroke();
  } else if (shape.type === 'rect' || shape.type === 'rectangle') {
    ctx.rect(shape.x || 0, shape.y || 0, shape.w || shape.width || 100, shape.h || shape.height || 60);
    if (fill && fill !== 'transparent') ctx.fill();
    ctx.stroke();
  } else if (shape.type === 'ellipse' || shape.type === 'circle') {
    const rx = (shape.w || shape.width || shape.r * 2 || 60) / 2;
    const ry = (shape.h || shape.height || shape.r * 2 || 60) / 2;
    ctx.ellipse((shape.x || 100) + rx, (shape.y || 100) + ry, rx, ry, 0, 0, Math.PI * 2);
    if (fill && fill !== 'transparent') ctx.fill();
    ctx.stroke();
  } else if (shape.type === 'arrow') {
    const x1 = shape.x1 || shape.x || 0, y1 = shape.y1 || shape.y || 0;
    const x2 = shape.x2 || x1 + (shape.w || 100), y2 = shape.y2 || y1;
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const hs = 12;
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - hs * Math.cos(angle - Math.PI / 6), y2 - hs * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(x2 - hs * Math.cos(angle + Math.PI / 6), y2 - hs * Math.sin(angle + Math.PI / 6));
    ctx.closePath(); ctx.fill();
  }

  if (text) {
    ctx.font = `${fontSize}px sans-serif`;
    ctx.fillStyle = c;
    ctx.fillText(text, (shape.x || 0) + 8, (shape.y || 0) + 24);
  }
}

let agentTimer = null;
function showAgentOverlay() {
  const el = document.getElementById('agent-overlay');
  el.classList.add('visible');
  clearTimeout(agentTimer);
  agentTimer = setTimeout(() => el.classList.remove('visible'), 2000);
}

// Announce ready immediately
window.parent.postMessage({ type: 'whiteboard:iframe_ready' }, '*');
</script>
</body>
</html>
